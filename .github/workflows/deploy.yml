name: Deploy to Amazon EKS

on:
  push:
    branches: [ "main" ] # Trigger on every push to main

env:
  ECR_REPOSITORY: my-python-service
  EKS_CLUSTER_NAME: my-microservice-cluster

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }} # Uses the unique git commit ID as the tag
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Update Kubeconfig
      run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

    - name: Deploy to EKS
      run: |
        # We need to get the registry URL again or use the one from the login step
        REGISTRY=${{ steps.login-ecr.outputs.registry }}
        REPO=${{ env.ECR_REPOSITORY }}
        TAG=${{ github.sha }}
        
        # Swap the placeholder for the real image path
        sed -i "s|CONTAINER_IMAGE|$REGISTRY/$REPO:$TAG|g" deployment.yaml
        
        # Apply the update
        kubectl apply -f deployment.yaml